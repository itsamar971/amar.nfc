    <!-- Tailwind CSS -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        background: '#ffffff',
                        'bg-gradient-start': '#ffffff',
                        'bg-gradient-end': '#ffffff',
                        card: '#F8F8F8',
                        accent: {
                            blue: '#3B82F6',
                            cyan: '#22D3EE',
                            lime: '#D9FF00',
                            purple: '#8B5CF6',
                            orange: '#F97316',
                        },
                        border: '#000000'
                    },
                    fontFamily: {
                        sans: ['Inter', 'sans-serif'],
                    },
                    boxShadow: {
                        'brutal': '6px 6px 0px 0px #000000',
                        'brutal-sm': '4px 4px 0px 0px #000000',
                        'brutal-hover': '2px 2px 0px 0px #000000',
                        'neon-blue': '0 0 20px rgba(59, 130, 246, 0.3)',
                    },
                    animation: {
                        'float': 'float 6s ease-in-out infinite',
                        'glow': 'glow 4s ease-in-out infinite',
                        'slide-up': 'slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1) forwards',
                    },
                    keyframes: {
                        float: {
                            '0%, 100%': { transform: 'translateY(0)' },
                            '50%': { transform: 'translateY(-10px)' },
                        },
                        glow: {
                            '0%, 100%': { opacity: 0.5, filter: 'blur(40px)' },
                            '50%': { opacity: 0.8, filter: 'blur(60px)' },
                        },
                        slideUp: {
                            '0%': { opacity: 0, transform: 'translateY(40px)' },
                            '100%': { opacity: 1, transform: 'translateY(0)' },
                        }
                    }
                }
            }
        }
    </script>

    <style>
        :root {
            --brutal-shadow: 4px 4px 0px 0px #000000;
        }

        body {
            background-color: #ffffff !important;
            background-image:
                linear-gradient(#e0e0e0 1px, transparent 1px),
                linear-gradient(90deg, #e0e0e0 1px, transparent 1px) !important;
            background-size: 60px 60px !important;
            -webkit-tap-highlight-color: transparent;
            height: 100dvh;
            width: 100vw;
            overflow: hidden;
            margin: 0;
            display: flex;
            flex-direction: column;
        }

        .shadow-brutal {
            box-shadow: var(--brutal-shadow);
        }

        .animate-float {
            animation: float 6s ease-in-out infinite;
        }

        .animate-slide-up {
            animation: slideUp 0.8s cubic-bezier(0.16, 1, 0.3, 1) forwards;
        }

        @keyframes float {

            0%,
            100% {
                transform: translateY(0);
            }

            50% {
                transform: translateY(-10px);
            }
        }

        @keyframes slideUp {
            0% {
                opacity: 0;
                transform: translateY(40px) scale(0.95);
            }

            100% {
                opacity: 1;
                transform: translateY(0) scale(1);
            }
        }
    </style>
</head>
